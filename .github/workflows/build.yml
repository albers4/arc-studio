name: Build and Release

on:
    push:
        branches: [ main ]
        tags:
            - 'v*' # Trigger on version tags like v1.0.0
    pull_request:
        branches: [ main ]
    workflow_dispatch: # Allow manual triggering

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                include:
                    -   os: ubuntu-latest
                        artifact_name: arc-studio-linux
                    -   os: windows-latest
                        artifact_name: arc-studio-windows
                    -   os: macos-latest
                        artifact_name: arc-studio-macos

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
                with:
                    submodules: recursive

            -   name: Install Linux dependencies
                if: runner.os == 'Linux'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y \
                        libgl1-mesa-dev \
                        libxrandr-dev \
                        libxinerama-dev \
                        libxcursor-dev \
                        libxi-dev \
                        libwayland-dev \
                        wayland-protocols \
                        extra-cmake-modules

            -   name: Configure CMake (Linux)
                if: runner.os == 'Linux'
                run: |
                    cmake -B build \
                        -DCMAKE_BUILD_TYPE=Release \
                        -DGLFW_BUILD_WAYLAND=OFF \
                        -DGLFW_BUILD_X11=ON

            -   name: Configure CMake (Windows/macOS)
                if: runner.os != 'Linux'
                run: cmake -B build -DCMAKE_BUILD_TYPE=Release

            -   name: Build
                run: cmake --build build --config Release

            -   name: Upload artifact (Linux)
                if: runner.os == 'Linux'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.artifact_name }}
                    path: build/arc-studio

            -   name: Upload artifact (macOS)
                if: runner.os == 'macOS'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.artifact_name }}
                    path: build/arc-studio

            -   name: Upload artifact (Windows)
                if: runner.os == 'Windows'
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.artifact_name }}
                    path: build/Release/arc-studio.exe

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            -   name: Download all artifacts
                uses: actions/download-artifact@v4

            -   name: Display structure of download files
                run: ls -R

            -   name: Create Release
                uses: softprops/action-gh-release@v1
                with:
                    files: |
                        arc-studio-linux/**
                        arc-studio-windows/**
                        arc-studio-macos/**
                    generate_release_notes: true
                    fail_on_unmatched_files: false
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
