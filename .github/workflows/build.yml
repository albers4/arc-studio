name: Build and Release

on:
    push:
        tags:
            - 'v*' # Trigger on version tags like v1.0.0
    workflow_dispatch: # Allow manual triggering

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                include:
                    -   os: ubuntu-latest
                        artifact_name: arc-studio-linux
                        assert_name: arc-studio-linux
                    -   os: windows-latest
                        artifact_name: arc-studio-windows
                        assert_name: arc-studio-windows.exe
                    -   os: macos-latest
                        artifact_name: arc-studio-macos
                        assert_name: arc-studio-macos

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
                with:
                    submodules: recursive

            -   name: Install Linux dependencies
                if: runner.os == 'Linux'
                run: |
                    sudo apt-get update
                    sudo apt-get install -y libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

            -   name: Configure CMake
                run: cmake -B build -DCMAKE_BUILD_TYPE=Release

            -   name: Upload artifact
                uses: actions/upload-artifact@v4
                with:
                    name: ${{ matrix.artifact_name }}
                    path: |
                        build/arc-studio${{ runner.os == 'Windows' && '.exe' || '' }}
                        build/Release/arc-studio.exe

    release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            -   name: Download all artifacts
                uses: actions/download-artifact@v4

            -   name: Create Release
                uses: softprops/action-gh-release@v1
                with:
                    files: |
                        arc-studio-linux/arc-studio*
                        arc-studio-windows/arc-studio*
                        arc-studio-macos/arc-studio*
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


                    